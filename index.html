<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkour Masters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            width: 100%;
            height: 100%;
        }

        html {
            width: 100%;
            height: 100%;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: block;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #level-display {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #timer {
            font-size: 28px;
            color: #ff6b6b;
            font-family: 'Courier New', monospace;
        }

        #level-title {
            font-size: 16px;
            color: #4ecdc4;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .modal.hidden {
            display: none !important;
        }

        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out;
            max-width: 500px;
        }

        @keyframes slideIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-content button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-content button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .modal-content button:active {
            transform: translateY(0);
        }

        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #4ecdc4;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            z-index: 10;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div id="level-display">Level <span id="level-number">1</span>/10</div>
            <div id="timer">0.0s</div>
            <div id="level-title">Urban Jungle</div>
        </div>
        
        <div id="level-complete" class="modal hidden">
            <div class="modal-content">
                <h2>Level Complete!</h2>
                <p id="completion-time">Time: 0.0s</p>
                <button onclick="nextLevel()">Next Level</button>
            </div>
        </div>
        
        <div id="game-over" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>You fell!</p>
                <button onclick="restartLevel()">Retry Level</button>
                <button onclick="goToMenu()">Main Menu</button>
            </div>
        </div>
        
        <div id="main-menu" class="modal">
            <div class="modal-content">
                <h1>🏃 Parkour Masters</h1>
                <p>Navigate treacherous platforms with precision!</p>
                <p>Master double jumps, dashes, and weird mechanics!</p>
                <button onclick="startGame()">Start Game</button>
            </div>
        </div>
        
        <div id="controls-info">
            <p><strong>Arrow Keys</strong> or <strong>A/D</strong> to move | <strong>SPACE</strong> to jump | <strong>Shift</strong> to dash | <strong>R</strong> to restart</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
